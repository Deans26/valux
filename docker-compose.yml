services:
  db:
    image: postgres:15-alpine
    container_name: valux_db
    restart: always
    environment:
      POSTGRES_USER: valux_user
      POSTGRES_PASSWORD: valux_pass_local
      POSTGRES_DB: valux_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: valux_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: